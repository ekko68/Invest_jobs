# feign
feign.httpclient.connection-timeout=300000

# \uBA54\uC778\uBC15\uC2A4 \uD30C\uC77C \uB2E4\uC6B4\uB85C\uB4DC\uB294 \uD0C0\uC784\uC544\uC6C3 \uAE30\uC900\uC744 \uD655\uC7A5
feign.client.config.box-open-api-file.connect-timeout=300000
feign.client.config.box-open-api-file.read-timeout=300000

# jasypt bean name
jasypt.encryptor.bean = jasyptStringEncryptor

